<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIELD SQL | Intelligence Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --shield-blue: #00d2ff;
            --shield-dark: #050a14;
            --shield-panel: rgba(10, 20, 40, 0.8);
            --shield-glow: 0 0 15px rgba(0, 210, 255, 0.5);
        }
        body {
            background-color: var(--shield-dark);
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 50, 100, 0.2) 0%, transparent 80%),
                linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .shield-border {
            border: 1px solid var(--shield-blue);
            box-shadow: var(--shield-glow);
        }
        .shield-panel {
            background: var(--shield-panel);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 210, 255, 0.3);
        }
        .glow-text {
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.8);
        }
        .btn-shield {
            background: linear-gradient(135deg, #00507a 0%, #00d2ff 100%);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn-shield:hover {
            box-shadow: 0 0 20px var(--shield-blue);
            transform: scale(1.05);
        }
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 210, 255, 0.1);
            position: fixed;
            top: 0;
            z-index: 100;
            animation: scan 8s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div class="scanline"></div>

    <!-- Header -->
    <header class="p-6 shield-panel border-b border-cyan-500/30 flex justify-between items-center">
        <div class="flex items-center space-x-4">
            <div class="w-12 h-12 rounded-full border-2 border-cyan-400 flex items-center justify-center glow-text orbitron text-xl">
                S
            </div>
            <h1 class="orbitron text-2xl font-bold tracking-widest text-cyan-400 glow-text">SHIELD SQL</h1>
        </div>
        <nav class="space-x-8 orbitron text-xs tracking-tighter">
            <a href="{% url 'detective:home' %}" class="hover:text-cyan-400 transition-colors uppercase">HQ</a>
            <a href="{% url 'detective:schema' %}" class="hover:text-cyan-400 transition-colors uppercase">Database Schema</a>
            <a href="{% url 'detective:investigate' %}" class="hover:text-cyan-400 transition-colors uppercase">Investigation Console</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto p-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="p-4 text-center text-xs text-cyan-500/50 orbitron">
        CLASSIFIED // LEVEL 7 CLEARANCE ONLY // S.H.I.E.L.D. DATABASE v5.2.9
    </footer>
</body>
</html>
